<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MedINTEL — AI Chatbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #be6d32;
    --ink:     #1f1f1f;
    --secondary: #6b6761;
    --muted:   #b7b1a8;
    --cream:   #fbfaf6;
    --ease:    cubic-bezier(.22,1,.36,1);
    --grad: linear-gradient(180deg,
      rgba(245,192,153,0.20)  0%,
      rgba(223,145,88, 0.30) 59.14%,
      rgba(207,127,69, 0.30) 74.04%,
      rgba(248,186,141,0.50) 99.52%
    );
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Entrance ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  .chat-wrap {
    position: relative;
    animation: fadeUp 0.75s 0.1s var(--ease) both;
  }

  /* ══════════════════════════════════════
     Outer gradient "border" container
  ══════════════════════════════════════ */
  .chat-outer {
    position: relative;
    width: 540px;
    max-width: calc(100vw - 48px);
    height: 150px;
    border-radius: 15px;
    background: var(--grad);
    padding: 6px;
    overflow: hidden;
    /* Idle: gentle shadow breathe */
    animation: idleBreathe 5s ease-in-out infinite;
    transition: height    0.58s var(--ease),
                transform 0.45s var(--ease),
                box-shadow 0.45s ease;
  }

  @keyframes idleBreathe {
    0%,100% { box-shadow: 0 2px 14px rgba(190,109,50,0.07); }
    50%     { box-shadow: 0 5px 24px rgba(190,109,50,0.13); }
  }

  /* Focus: lift + warm shadow, pause idle */
  .chat-outer.focused {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(190,109,50,0.14);
    animation: none;
  }

  /* Listening: collapse + pulse */
  .chat-outer.listening {
    height: 78px;
    transform: none;
    animation: glowPulse 2.4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { box-shadow: 0 4px 28px rgba(190,109,50,0.12); }
    50%     { box-shadow: 0 6px 40px rgba(190,109,50,0.22); }
  }

  /* ══════════════════════════════════════
     Shared: both inner states
  ══════════════════════════════════════ */
  .chat-inner, .chat-listen {
    position: absolute;
    top: 6px; left: 6px;
    width: calc(100% - 12px);
    background: #fff;
    border-radius: 10px;
  }

  /* ── STATE 1 & 2 : textarea view ── */
  .chat-inner {
    height: 138px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 18px 20px 16px;
    opacity: 1;
    transform: none;
    pointer-events: all;
    transition: opacity 0.2s var(--ease), transform 0.2s var(--ease);
  }
  .chat-outer.listening .chat-inner {
    opacity: 0;
    transform: translateY(-6px) scale(0.98);
    pointer-events: none;
  }

  textarea.chat-ta {
    flex: 1;
    resize: none;
    border: none;
    outline: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    color: var(--ink);
    width: 100%;
    min-height: 0;
    scrollbar-width: none;
  }
  textarea.chat-ta::-webkit-scrollbar { display: none; }
  textarea.chat-ta::placeholder {
    color: var(--muted);
    transition: color 0.3s ease;
  }
  textarea.chat-ta:focus::placeholder { color: rgba(183,177,168,0.5); }

  .chat-actions {
    display: flex;
    align-items: center;
    gap: 12px;
    align-self: flex-end;
    margin-top: 6px;
  }

  /* ── STATE 3 : listening pill ── */
  .chat-listen {
    height: 66px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 10px;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity 0.3s var(--ease) 0.24s,
                transform 0.3s var(--ease) 0.24s;
  }
  .chat-outer.listening .chat-listen {
    opacity: 1;
    transform: none;
    pointer-events: all;
  }

  /* Centre section */
  .listen-center {
    display: flex;
    align-items: center;
    gap: 10px;
    flex: 1;
    justify-content: center;
  }

  /* ── Waveform bars ── */
  .waveform {
    display: flex;
    align-items: center;
    gap: 3px;
    height: 20px;
  }
  .wave-bar {
    width: 3px;
    border-radius: 3px;
    background: linear-gradient(180deg, #be6d32 0%, #df9158 100%);
    transform-origin: center;
    animation: waveBounce 1.15s ease-in-out infinite;
    animation-play-state: paused;
    will-change: transform;
  }
  .chat-outer.listening .wave-bar { animation-play-state: running; }

  .wave-bar:nth-child(1) { height:  8px; animation-delay: 0s;    }
  .wave-bar:nth-child(2) { height: 17px; animation-delay: 0.20s; }
  .wave-bar:nth-child(3) { height: 21px; animation-delay: 0.08s; }
  .wave-bar:nth-child(4) { height: 13px; animation-delay: 0.30s; }
  .wave-bar:nth-child(5) { height:  7px; animation-delay: 0.14s; }

  @keyframes waveBounce {
    0%,100% { transform: scaleY(1);    opacity: 1;   }
    50%     { transform: scaleY(0.22); opacity: 0.55; }
  }

  /* Gradient italic brand text */
  .listen-text { font-size: 15px; white-space: nowrap; }
  .listen-brand {
    font-style: italic;
    background: linear-gradient(180deg, #be6d32 0%, #df9158 59.14%, #cf7f45 74.04%, #f8ba8d 99.52%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .listen-plain { color: var(--ink); }

  /* ══════════════════════════════════════
     Buttons
  ══════════════════════════════════════ */
  .chat-btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: none;
    background: transparent;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    color: var(--muted);
    transition: color      0.25s var(--ease),
                background 0.2s  var(--ease),
                border-color 0.2s var(--ease),
                transform  0.18s var(--ease);
  }
  .chat-btn:active { transform: scale(0.88); }

  /* Mic */
  .mic-btn:hover {
    background: rgba(190,109,50,0.07);
    color: var(--secondary);
    transform: scale(1.08);
  }

  /* Send — default */
  .send-btn {
    background: var(--cream);
    border: 1.2px solid rgba(239,234,227,0.3);
  }
  .send-btn:hover { background: #f6efe5; border-color: rgba(190,109,50,0.2); }

  /* Send — active: small pop animation when it first becomes active */
  .chat-inner.has-text .send-btn,
  .chat-listen .send-btn {
    border-color: rgba(190,109,50,0.25);
    color: var(--primary);
  }
  .chat-inner.has-text .send-btn {
    animation: sendPop 0.35s var(--ease) both;
  }
  @keyframes sendPop {
    from { transform: scale(0.85); opacity: 0.6; }
    to   { transform: scale(1);    opacity: 1;   }
  }

  /* Close (X) */
  .close-btn { color: var(--secondary); }
  .close-btn:hover { background: rgba(190,109,50,0.07); color: var(--ink); }

</style>
</head>
<body>

<!-- ══════ CHATBOX ══════ -->
<div class="chat-wrap">
<div class="chat-outer" id="chatOuter">

  <!-- States 1 & 2 : typing view -->
  <div class="chat-inner" id="chatInner">
    <textarea
      class="chat-ta"
      id="chatInput"
      placeholder="Type in your question or use the mic..."
    ></textarea>
    <div class="chat-actions">
      <!-- Mic button -->
      <button class="chat-btn mic-btn" id="micBtn" aria-label="Voice input">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round">
          <rect x="9" y="2" width="6" height="11" rx="3"/>
          <path d="M5 10a7 7 0 0 0 14 0"/>
          <line x1="12" y1="19" x2="12" y2="22"/>
          <line x1="9"  y1="22" x2="15" y2="22"/>
        </svg>
      </button>
      <!-- Send button -->
      <button class="chat-btn send-btn" id="sendBtnText" aria-label="Send">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
             stroke="currentColor" stroke-width="1.7"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 2L11 13"/>
          <path d="M22 2L15 22 11 13 2 9l20-7z"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- State 3 : listening pill -->
  <div class="chat-listen" id="chatListen">
    <!-- X close -->
    <button class="chat-btn close-btn" id="closeListenBtn" aria-label="Stop listening">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.8" stroke-linecap="round">
        <path d="M18 6 6 18M6 6l12 12"/>
      </svg>
    </button>
    <!-- Waveform + text -->
    <div class="listen-center">
      <div class="waveform">
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
        <span class="wave-bar"></span>
      </div>
      <p class="listen-text">
        <span class="listen-brand">MedIntel AI </span><span class="listen-plain">is Listening...</span>
      </p>
    </div>
    <!-- Send -->
    <button class="chat-btn send-btn" id="sendBtnListen" aria-label="Send voice">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"
           stroke="currentColor" stroke-width="1.7"
           stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L15 22 11 13 2 9l20-7z"/>
        <path d="M22 2L11 13"/>
      </svg>
    </button>
  </div>

</div>
</div>

<script>
(() => {
  const outer    = document.getElementById('chatOuter');
  const inner    = document.getElementById('chatInner');
  const textarea = document.getElementById('chatInput');

  // Focus lift
  textarea.addEventListener('focus', () => outer.classList.add('focused'));
  textarea.addEventListener('blur',  () => outer.classList.remove('focused'));

  // Typing: toggle has-text (activates send button)
  textarea.addEventListener('input', () => {
    inner.classList.toggle('has-text', textarea.value.trim().length > 0);
  });

  // Mic: enter listening state
  document.getElementById('micBtn').addEventListener('click', () => {
    outer.classList.add('listening');
    outer.classList.remove('focused');
    textarea.blur();
  });

  // X: exit listening → return to text
  document.getElementById('closeListenBtn').addEventListener('click', () => {
    outer.classList.remove('listening');
    setTimeout(() => textarea.focus(), 380);
  });

  // Send from listening: submit + reset
  document.getElementById('sendBtnListen').addEventListener('click', () => {
    outer.classList.remove('listening');
    textarea.value = '';
    inner.classList.remove('has-text');
  });

  // Send from text: fade out → clear
  document.getElementById('sendBtnText').addEventListener('click', () => {
    if (!textarea.value.trim()) return;
    textarea.style.transition = 'opacity .2s ease';
    textarea.style.opacity = '0';
    setTimeout(() => {
      textarea.value = '';
      inner.classList.remove('has-text');
      textarea.style.opacity = '1';
    }, 200);
  });
})();
</script>
</body>
</html>
