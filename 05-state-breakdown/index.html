<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>MedINTEL — State Breakdown</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --primary:   #be6d32;
    --ink:       #1f1f1f;
    --secondary: #6b6761;
    --muted:     #b7b1a8;
    --cream:     #fbfaf6;
    --ease:      cubic-bezier(.22,1,.36,1);
    --spring:    cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: #ede8e0;
    min-height: 100vh;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 32px 24px;
    -webkit-font-smoothing: antialiased;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: none; }
  }

  .page {
    width: 100%;
    max-width: 1360px;
    animation: fadeUp 0.7s 0.05s var(--ease) both;
  }

  /* ── Outer cream card ── */
  .card-container {
    background: var(--cream);
    border: 1px solid rgba(239,234,227,0.5);
    border-radius: 12px;
    padding: 12px;
  }

  /* ── Inner row: left states + right breakdown ── */
  .inner-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  /* ══════════════════════════════════════
     LEFT: States panel
  ══════════════════════════════════════ */
  .states-panel {
    background: white;
    border: 1px solid rgba(231,225,216,0.4);
    border-radius: 12px;
    padding: 16px;
    flex: 3 0 0;
    min-width: 0;
  }

  .states-inner {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  /* Zone group */
  .zone { display: flex; flex-direction: column; gap: 8px; }

  .zone-label {
    font-size: 8px;
    font-weight: 600;
    letter-spacing: 1.8px;
    text-transform: uppercase;
    color: var(--secondary);
    padding-left: 2px;
  }

  .zone-states {
    display: flex;
    flex-wrap: wrap;
    column-gap: 8px;
    row-gap: 0;
  }

  /* ── State chip ── */
  .state-card {
    height: 40px;
    width: 110px;
    border-radius: 7px;
    border: 1px solid #f5f2ed;
    background: rgba(255,255,255,0.5);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--secondary);
    cursor: pointer;
    letter-spacing: 0.2px;
    transition:
      background   0.22s var(--ease),
      border-color 0.22s var(--ease),
      color        0.22s var(--ease);
  }

  .state-card.muted {
    opacity: 0.7;
    color: var(--muted);
  }

  .state-card.active {
    background: rgba(190,109,50,0.1);
    border-color: rgba(190,109,50,0.1);
    color: var(--primary);
  }
  .state-card.muted.active { opacity: 1; }

  .state-card:hover:not(.active) {
    background: rgba(190,109,50,0.05);
    border-color: rgba(190,109,50,0.15);
  }

  /* Bouncy click animation */
  @keyframes cardBounce {
    0%   { transform: scale(1);    }
    22%  { transform: scale(0.91); }
    50%  { transform: scale(1.06); }
    72%  { transform: scale(0.97); }
    88%  { transform: scale(1.02); }
    100% { transform: scale(1);    }
  }
  .state-card.bouncing {
    animation: cardBounce 0.48s var(--ease);
  }

  /* ══════════════════════════════════════
     RIGHT: Breakdown panel
  ══════════════════════════════════════ */
  .breakdown-panel {
    flex: 1 0 0;
    min-width: 0;
    background: var(--cream);
    border: 1px solid rgba(239,234,227,0.5);
    border-radius: 12px;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    overflow: hidden;
    position: sticky;
    top: 32px;
    align-self: flex-start;
  }

  /* Header row: icon + label */
  .bd-header {
    display: flex;
    align-items: center;
    gap: 6px;
    width: 100%;
    flex-shrink: 0;
  }
  .bd-header-icon {
    width: 16px;
    height: 16px;
    flex-shrink: 0;
    overflow: hidden;
    position: relative;
  }
  .bd-label {
    flex: 1 0 0;
    min-width: 0;
    font-size: 13px;
    color: var(--secondary);
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* Metric card */
  .metric-card {
    background: #fefefe;
    border: 1px solid rgba(231,225,216,0.4);
    border-radius: 12px;
    padding: 12px 12px 12px 16px;
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    flex-shrink: 0;
    width: 100%;
  }

  /* Bar chart row — items-end aligns bars at the baseline */
  .bars-row {
    display: flex;
    gap: 8px;
    align-items: flex-end;
    width: 100%;
  }

  /* Column: bar + label */
  .bar-col {
    flex: 1 0 0;
    min-width: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  /* The bar itself — height changes via JS */
  .bar {
    width: 100%;
    border-radius: 12px 12px 0 0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-end;
    padding: 12px 12px 8px;
    /* Spring bounce on height changes */
    transition: height 0.58s var(--spring);
    flex-shrink: 0;
  }

  .bar-active  { background: #fffbeb; border: 1px solid rgba(245,158,11,0.10); }
  .bar-cleared { background: #f0fdf4; border: 1px solid rgba(34,197,94,0.10);  }
  .bar-deaths  { background: #fef2f2; border: 1px solid rgba(239,68,68,0.10);  }

  .bar-val {
    font-size: 14px;
    font-weight: 500;
    text-align: center;
    line-height: 1;
    white-space: nowrap;
  }
  .bar-active  .bar-val { color: #d97706; }
  .bar-cleared .bar-val { color: #15803d; }
  .bar-deaths  .bar-val { color: #dc2626; }

  .bar-lbl {
    font-size: 12px;
    color: var(--muted);
    text-align: center;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    width: 100%;
  }
</style>
</head>
<body>

<div class="page">
  <div class="card-container">
    <div class="inner-row">

      <!-- ══ LEFT: States ══ -->
      <div class="states-panel">
        <div class="states-inner" id="zonesContainer"></div>
      </div>

      <!-- ══ RIGHT: Breakdown ══ -->
      <div class="breakdown-panel">

        <!-- Header -->
        <div class="bd-header">
          <div class="bd-header-icon">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M8 1.5C5.51 1.5 3.5 3.51 3.5 6c0 3.75 4.5 8.5 4.5 8.5s4.5-4.75 4.5-8.5c0-2.49-2.01-4.5-4.5-4.5zm0 6.08a1.58 1.58 0 1 1 0-3.16 1.58 1.58 0 0 1 0 3.16z" fill="#6b6761"/>
            </svg>
          </div>
          <p class="bd-label">State cases breakdown</p>
        </div>

        <!-- Metric card with bar chart -->
        <div class="metric-card">
          <div class="bars-row">

            <!-- Active Cases -->
            <div class="bar-col">
              <div class="bar bar-active" id="barActive">
                <span class="bar-val" id="valActive">10,000</span>
              </div>
              <span class="bar-lbl">Active Cases</span>
            </div>

            <!-- Cleared Cases -->
            <div class="bar-col">
              <div class="bar bar-cleared" id="barCleared">
                <span class="bar-val" id="valCleared">2,300</span>
              </div>
              <span class="bar-lbl">Cleared Cases</span>
            </div>

            <!-- Death Cases -->
            <div class="bar-col">
              <div class="bar bar-deaths" id="barDeaths">
                <span class="bar-val" id="valDeaths">10</span>
              </div>
              <span class="bar-lbl">Death Cases</span>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>

<script>
(() => {
  /* ── Zone + state data ── */
  const zones = [
    { name: 'North West',    states: ['Sokoto','Kebbi','Zamfara','Katsina','Kano','Jigawa','Kaduna'],         muted: ['Kaduna'] },
    { name: 'North East',    states: ['Borno','Yobe','Adamawa','Gombe','Bauchi','Taraba'],                    muted: ['Bauchi'] },
    { name: 'North Central', states: ['Niger','Kwara','Kogi','Benue','Plateau','Nasarawa','FCT Abuja'],        muted: ['Kogi'] },
    { name: 'South West',    states: ['Oyo','Ogun','Lagos','Osun','Ondo','Ekiti'],                            muted: ['Ondo'] },
    { name: 'South East',    states: ['Enugu','Anambra','Imo','Abia','Ebonyi'],                               muted: ['Anambra'] },
    { name: 'South South',   states: ['Rivers','Bayelsa','Delta','Edo','Cross River','Akwa Ibom'],            muted: ['Cross River'] },
  ];

  const stats = {
    'Sokoto':     { active: 10000, cleared:  2300, deaths:  10 },
    'Kebbi':      { active:  7200, cleared:  3800, deaths:  18 },
    'Zamfara':    { active:  8500, cleared:  1900, deaths:  31 },
    'Katsina':    { active:  6300, cleared:  4200, deaths:  14 },
    'Kano':       { active: 15000, cleared:  6800, deaths:  42 },
    'Jigawa':     { active:  5100, cleared:  2100, deaths:   8 },
    'Kaduna':     { active:  9200, cleared:  3500, deaths:  27 },
    'Borno':      { active: 12000, cleared:  2800, deaths:  55 },
    'Yobe':       { active:  4800, cleared:  1600, deaths:  19 },
    'Adamawa':    { active:  6100, cleared:  2900, deaths:  13 },
    'Gombe':      { active:  3900, cleared:  2200, deaths:   7 },
    'Bauchi':     { active:  5500, cleared:  1800, deaths:  23 },
    'Taraba':     { active:  4200, cleared:  1400, deaths:  11 },
    'Niger':      { active:  7800, cleared:  4100, deaths:  29 },
    'Kwara':      { active:  5600, cleared:  3200, deaths:  16 },
    'Kogi':       { active:  4100, cleared:  2600, deaths:  20 },
    'Benue':      { active:  6800, cleared:  3700, deaths:  25 },
    'Plateau':    { active:  5900, cleared:  3100, deaths:  17 },
    'Nasarawa':   { active:  4400, cleared:  2000, deaths:  12 },
    'FCT Abuja':  { active:  8900, cleared:  5600, deaths:  33 },
    'Oyo':        { active: 11000, cleared:  5200, deaths:  38 },
    'Ogun':       { active:  7400, cleared:  4900, deaths:  22 },
    'Lagos':      { active: 18000, cleared:  9500, deaths:  67 },
    'Osun':       { active:  5200, cleared:  3300, deaths:  14 },
    'Ondo':       { active:  4700, cleared:  2700, deaths:  21 },
    'Ekiti':      { active:  3800, cleared:  2100, deaths:   9 },
    'Enugu':      { active:  6500, cleared:  3800, deaths:  19 },
    'Anambra':    { active:  5300, cleared:  2900, deaths:  15 },
    'Imo':        { active:  7100, cleared:  4200, deaths:  28 },
    'Abia':       { active:  4900, cleared:  2800, deaths:  11 },
    'Ebonyi':     { active:  3600, cleared:  1900, deaths:   8 },
    'Rivers':     { active: 13000, cleared:  6100, deaths:  48 },
    'Bayelsa':    { active:  4300, cleared:  2100, deaths:  16 },
    'Delta':      { active:  8700, cleared:  4800, deaths:  31 },
    'Edo':        { active:  7600, cleared:  4300, deaths:  26 },
    'Cross River':{ active:  5100, cleared:  2700, deaths:  18 },
    'Akwa Ibom':  { active:  6900, cleared:  3900, deaths:  22 },
  };

  /* Each category scales independently so even small death counts show a visible bar */
  const MAX_ACTIVE  = 18000; // Lagos
  const MAX_CLEARED =  9500; // Lagos
  const MAX_DEATHS  =    67; // Lagos

  const H_ACTIVE  = 150; // max bar height for active cases
  const H_CLEARED = 130; // max bar height for cleared cases
  const H_DEATHS  = 100; // max bar height for death cases
  const H_MIN     =  36; // minimum height so the number fits inside the bar

  function barH(val, max, maxH) {
    return Math.max(H_MIN, Math.round((val / max) * maxH));
  }

  /* ── Bar elements ── */
  const barActive  = document.getElementById('barActive');
  const barCleared = document.getElementById('barCleared');
  const barDeaths  = document.getElementById('barDeaths');
  const valActive  = document.getElementById('valActive');
  const valCleared = document.getElementById('valCleared');
  const valDeaths  = document.getElementById('valDeaths');

  /* ── Number counter animation ── */
  let cur = { active: 10000, cleared: 2300, deaths: 10 };

  function animateCount(el, from, to, dur = 420) {
    const t0 = performance.now();
    const tick = (now) => {
      const p = Math.min((now - t0) / dur, 1);
      const e = 1 - Math.pow(1 - p, 3); // ease-out cubic
      el.textContent = Math.round(from + (to - from) * e).toLocaleString();
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  }

  /* ── Update breakdown panel ── */
  function updateBreakdown(name) {
    const d = stats[name];

    barActive.style.height  = barH(d.active,  MAX_ACTIVE,  H_ACTIVE)  + 'px';
    barCleared.style.height = barH(d.cleared, MAX_CLEARED, H_CLEARED) + 'px';
    barDeaths.style.height  = barH(d.deaths,  MAX_DEATHS,  H_DEATHS)  + 'px';

    animateCount(valActive,  cur.active,  d.active);
    animateCount(valCleared, cur.cleared, d.cleared);
    animateCount(valDeaths,  cur.deaths,  d.deaths);

    cur = { active: d.active, cleared: d.cleared, deaths: d.deaths };
  }

  /* ── Build zone cards ── */
  let activeCard = null;
  const container = document.getElementById('zonesContainer');

  zones.forEach(zone => {
    const zoneEl = document.createElement('div');
    zoneEl.className = 'zone';

    const label = document.createElement('div');
    label.className = 'zone-label';
    label.textContent = zone.name;
    zoneEl.appendChild(label);

    const row = document.createElement('div');
    row.className = 'zone-states';

    zone.states.forEach(name => {
      const btn = document.createElement('button');
      btn.className = 'state-card' + (zone.muted.includes(name) ? ' muted' : '');
      btn.textContent = name;
      btn.dataset.state = name;

      if (name === 'Sokoto') {
        btn.classList.add('active');
        activeCard = btn;
      }

      btn.addEventListener('click', () => {
        if (btn === activeCard) return;
        activeCard?.classList.remove('active');
        btn.classList.add('active');
        activeCard = btn;

        btn.classList.remove('bouncing');
        void btn.offsetWidth;
        btn.classList.add('bouncing');
        btn.addEventListener('animationend', () => btn.classList.remove('bouncing'), { once: true });

        updateBreakdown(name);
      });

      row.appendChild(btn);
    });

    zoneEl.appendChild(row);
    container.appendChild(zoneEl);
  });

  /* ── Set initial bar heights without animation ── */
  const init = stats['Sokoto'];
  [barActive, barCleared, barDeaths].forEach(b => b.style.transition = 'none');
  barActive.style.height  = barH(init.active,  MAX_ACTIVE,  H_ACTIVE)  + 'px';
  barCleared.style.height = barH(init.cleared, MAX_CLEARED, H_CLEARED) + 'px';
  barDeaths.style.height  = barH(init.deaths,  MAX_DEATHS,  H_DEATHS)  + 'px';

  requestAnimationFrame(() => requestAnimationFrame(() => {
    [barActive, barCleared, barDeaths].forEach(b => b.style.transition = '');
  }));

})();
</script>
</body>
</html>
